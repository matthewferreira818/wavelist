name: Refresh trending products

on:
  schedule:
    # every 3 days at 09:00 UTC (fires on days 1,4,7,...,28,31 of each month;
    # the month boundary makes one interval shorter than 3 days — close enough)
    - cron: "0 9 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run refresh script
        env:
          CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
        run: python refresh_products.py

      - name: Generate fresh social posts
        run: python generate_posts.py

      - name: Commit and push if anything changed
        id: commit
        run: |
          git add products.json marketing/latest-posts.md
          if ! git diff --cached --quiet; then
            git config user.name "wavelist-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit -m "Refresh: trending products + social posts (3-day cycle)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tweet the fresh drop (skips until X API secrets are configured)
        if: steps.commit.outputs.changed == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          pip install --quiet requests requests-oauthlib
          python post_refresh_tweet.py
