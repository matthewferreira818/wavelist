name: Product spotlight 3x daily (X + Instagram)

on:
  schedule:
    - cron: "0 13 * * *"  # morning slot  (~10am Atlantic)
    - cron: "0 17 * * *"  # afternoon slot (~2pm Atlantic)
    - cron: "0 21 * * *"  # evening slot  (~6pm Atlantic)
  workflow_dispatch:
    inputs:
      offset:
        description: "Shift the product pick (test runs use 1 to avoid duplicates)"
        required: false
        default: "0"

permissions:
  contents: read
  issues: write

jobs:
  spotlight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Skip the morning slot on refresh days (roundup covers it)
        id: gate
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 15 ] && git log --since=midnight --oneline | grep -q "Refresh: trending products"; then
            echo "Catalog refreshed today — the fresh-drops roundup covers the morning slot. Skipping."
            echo "post=false" >> "$GITHUB_OUTPUT"
          else
            echo "post=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.post == 'true'
        with:
          python-version: "3.12"

      - name: Post this slot's spotlight (ad card + QR reply)
        if: steps.gate.outputs.post == 'true'
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SPOTLIGHT_OFFSET: ${{ inputs.offset }}
        run: |
          pip install --quiet requests requests-oauthlib pillow segno
          python post_daily_tweet.py 2>&1 | tee tweet.log

      - name: Post today's Instagram photo (afternoon slot only; skips until IG secrets are configured)
        if: steps.gate.outputs.post == 'true' && (github.event.schedule == '0 17 * * *' || github.event_name == 'workflow_dispatch')
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python post_daily_instagram.py

      - name: Credit watch — alert if X credits are depleted
        if: steps.gate.outputs.post == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -q "X_CREDITS_DEPLETED" tweet.log; then
            if ! gh issue list --state open --search "X credits depleted" --json number --jq length | grep -qv '^0$'; then
              gh issue create \
                --title "🔴 X credits depleted — daily tweets are paused" \
                --body "A spotlight tweet failed with HTTP 402 (credits depleted). Top up at https://console.x.com (Buy Credits) and tweets resume automatically on the next run. Note: the bot now posts 3 spotlights + 3 QR replies a day (~180 posts/mo), so credits go ~6x faster than the old 1-a-day setup. No other store systems are affected."
            else
              echo "Depletion issue already open — not duplicating."
            fi
          else
            echo "Credits OK."
          fi
